related_agent: "agent:personal:sample-001"

notes: >
This example defines an attribution route that connects a detected usage
event to a registered personal trace fingerprint. The route is intended
to make a possible attribution relationship visible, reviewable, and
governable. It does not prove ownership, infringement, compensation, or
claim validity, and it does not execute payment or enforcement.

